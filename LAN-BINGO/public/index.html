<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎲 2-Player Bingo</title>
  <style>
    :root{
      --bg1:#f5f7fa;
      --bg2:#c3cfe2;
      --card:#ffffff;
      --card-2:#f8f9fa;
      --text:#333333;
      --muted:#607085;
      --primary:#1976d2;
      --primary-2:#1565c0;
      --accent:#e3f2fd;
      --accent-border:#bbdefb;
      --cell:#ffffff;
      --cell-border:#e9ecef;
      --marked:#dc3545;
      --marked-border:#c82333;
      --shadow:0 20px 40px rgba(0,0,0,0.10);
      --soft-shadow:0 10px 30px rgba(0,123,255,0.18);
      --panel-shadow:0 14px 32px rgba(0,0,0,0.12);
      --status-bg:rgba(255,255,255,0.72);
      --input:#ffffff;
      --chip:#f1f5f9;
      --chip-text:#334155;
      --overlay:rgba(17,24,39,0.58);
    }

    body.dark{
      --bg1:#0f172a;
      --bg2:#111827;
      --card:#111827;
      --card-2:#0b1220;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --primary:#60a5fa;
      --primary-2:#3b82f6;
      --accent:#172554;
      --accent-border:#1d4ed8;
      --cell:#0f172a;
      --cell-border:#1f2937;
      --marked:#ef4444;
      --marked-border:#dc2626;
      --shadow:0 20px 40px rgba(0,0,0,0.38);
      --soft-shadow:0 10px 30px rgba(96,165,250,0.18);
      --panel-shadow:0 14px 32px rgba(0,0,0,0.34);
      --status-bg:rgba(15,23,42,0.78);
      --input:#0b1220;
      --chip:#111827;
      --chip-text:#e5e7eb;
      --overlay:rgba(0,0,0,0.66);
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      padding:20px;
      background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);
      color:var(--text);
      transition:background .25s ease,color .25s ease;
    }

    .theme-toggle{
      position:fixed;
      top:16px;
      right:16px;
      z-index:1100;
      width:52px;
      height:52px;
      border:none;
      border-radius:16px;
      background:var(--card);
      color:var(--text);
      box-shadow:var(--panel-shadow);
      cursor:pointer;
      font-size:1.1rem;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(148,163,184,0.25);
    }

    .layout{
      max-width:1320px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1fr) 320px;
      gap:20px;
      align-items:start;
    }

    .container{
      min-width:0;
      background:var(--card);
      border-radius:22px;
      padding:30px;
      box-shadow:var(--shadow);
      border:1px solid rgba(148,163,184,0.12);
    }

    h1{
      text-align:center;
      color:var(--text);
      font-size:clamp(2rem, 4vw, 2.65rem);
      margin-bottom:18px;
      letter-spacing:-0.02em;
    }

    .player-role{
      background:var(--accent);
      padding:18px 20px;
      border-radius:16px;
      margin-bottom:18px;
      text-align:center;
      font-size:1.1rem;
      font-weight:bold;
      color:var(--primary);
      border:2px solid var(--accent-border);
      box-shadow:0 8px 18px rgba(0,0,0,0.04);
    }

    .top-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .turn-indicator{
      position:fixed;
      top:18px;
      left:18px;
      z-index:1000;
      background:linear-gradient(135deg,#ff9800,#ff5722);
      color:white;
      padding:14px 22px;
      border-radius:999px;
      font-size:1rem;
      font-weight:bold;
      box-shadow:0 8px 25px rgba(255,152,0,0.35);
      animation:pulse 2s infinite;
      max-width:calc(100vw - 120px);
      white-space:nowrap;
    }
    .turn-indicator.your-turn{
      animation:none !important;
      background:linear-gradient(135deg,#4caf50,#45a049) !important;
      box-shadow:0 8px 25px rgba(76,175,80,0.45) !important;
    }

    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

    .bingo-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      max-width:560px;
      margin:22px auto;
      padding:20px;
      background:var(--card-2);
      border-radius:22px;
      box-shadow:inset 0 2px 15px rgba(0,0,0,0.05);
      border:1px solid rgba(148,163,184,0.14);
    }

    .cell{
      aspect-ratio:1;
      background:var(--cell);
      border:3px solid var(--cell-border);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(2rem, 4vw, 3rem);
      font-weight:bold;
      color:var(--text);
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
      position:relative;
      user-select:none;
      min-height:64px;
    }

    .cell:hover:not(.marked):not(.locked){
      transform:translateY(-2px) scale(1.03);
      border-color:var(--primary);
      box-shadow:var(--soft-shadow);
    }

    .cell.marked{
      background:var(--marked) !important;
      color:white !important;
      border-color:var(--marked-border) !important;
      animation:markPop .35s ease;
    }

    .cell.marked::after{
      content:'✕';
      position:absolute;
      font-size:clamp(1.8rem, 3vw, 2.5rem);
      font-weight:bold;
      color:white;
      text-shadow:2px 2px 4px rgba(0,0,0,0.42);
    }

    .cell.locked{
      opacity:0.62;
      cursor:not-allowed;
    }

    @keyframes markPop{
      0%{transform:scale(.82) rotate(-12deg);}
      50%{transform:scale(1.12) rotate(8deg);}
      100%{transform:scale(1) rotate(0);}
    }

    .controls{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .controls button,
    .chat-send,
    .emoji-btn{
      border:none;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
    }

    .controls button{
      min-height:58px;
      padding:16px 26px;
      font-size:1.05rem;
      font-weight:700;
      border-radius:16px;
      color:white;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      box-shadow:0 10px 24px rgba(25,118,210,0.24);
      min-width:180px;
    }

    .controls button:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 28px rgba(25,118,210,0.28);
    }

    .controls button:active{
      transform:translateY(1px) scale(0.99);
    }

    .status{
      margin-top:18px;
      background:var(--status-bg);
      border:1px solid rgba(148,163,184,0.18);
      border-radius:18px;
      padding:18px 16px;
      text-align:center;
      backdrop-filter: blur(8px);
    }

    .status-title{
      font-size:1.05rem;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .game-status{
      margin-top:6px;
      font-size:1.1rem;
      font-weight:700;
      color:var(--text);
      min-height:28px;
    }

    .subtle{
      color:var(--muted);
      font-size:.95rem;
      margin-top:4px;
    }

    .chat-panel{
      position:sticky;
      top:86px;
      display:flex;
      flex-direction:column;
      gap:12px;
      height:calc(100vh - 110px);
      background:var(--card);
      border-radius:22px;
      border:1px solid rgba(148,163,184,0.14);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .chat-head{
      padding:18px 16px 8px;
      border-bottom:1px solid rgba(148,163,184,0.12);
    }

    .chat-head h2{
      font-size:1.05rem;
      margin-bottom:6px;
    }

    .chat-head p{
      color:var(--muted);
      font-size:.9rem;
      line-height:1.35;
    }

    .emoji-row{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      padding:0 14px;
    }

    .emoji-btn{
      height:46px;
      border-radius:14px;
      font-size:1.2rem;
      background:var(--chip);
      color:var(--chip-text);
      box-shadow:0 8px 16px rgba(0,0,0,0.08);
    }

    .emoji-btn:hover{
      transform:translateY(-1px);
    }

    .chat-log{
      flex:1;
      overflow:auto;
      margin:0 14px;
      padding:12px;
      border-radius:16px;
      background:var(--card-2);
      border:1px solid rgba(148,163,184,0.14);
    }

    .chat-empty{
      color:var(--muted);
      font-size:.95rem;
      text-align:center;
      padding:24px 10px;
    }

    .chat-item{
      display:flex;
      margin-bottom:10px;
    }

    .chat-bubble{
      max-width:100%;
      padding:10px 12px;
      border-radius:14px;
      background:var(--chip);
      color:var(--text);
      box-shadow:0 6px 14px rgba(0,0,0,0.06);
      word-break:break-word;
      line-height:1.35;
    }

    .chat-item.host{justify-content:flex-start;}
    .chat-item.guest{justify-content:flex-end;}
    .chat-item.host .chat-bubble{border-top-left-radius:6px;}
    .chat-item.guest .chat-bubble{border-top-right-radius:6px;}

    .chat-meta{
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-size:.72rem;
      color:var(--muted);
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .chat-composer{
      padding:0 14px 14px;
      display:flex;
      gap:10px;
    }

    .chat-input{
      flex:1;
      min-height:52px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,0.18);
      background:var(--input);
      color:var(--text);
      padding:0 14px;
      font-size:1rem;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .chat-input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(96,165,250,0.18);
    }

    .chat-send{
      min-width:56px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:white;
      font-size:1rem;
      font-weight:700;
      box-shadow:0 10px 24px rgba(25,118,210,0.2);
    }

    .winner-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--overlay);
      z-index:2000;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }

    .winner-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .winner-card{
      background:var(--card);
      color:var(--text);
      padding:26px 30px;
      border-radius:24px;
      text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,0.30);
      transform:scale(.88);
      animation:popCard .48s ease forwards;
      max-width:min(90vw, 420px);
      border:1px solid rgba(148,163,184,0.2);
    }

    .winner-card h3{
      font-size:2rem;
      margin-bottom:8px;
    }

    .winner-card p{
      color:var(--muted);
      font-size:1rem;
    }

    @keyframes popCard{
      to{transform:scale(1);}
    }

    .confetti{
      position:fixed;
      top:-10px;
      width:10px;
      height:18px;
      border-radius:3px;
      z-index:2100;
      animation:fall 1.9s linear forwards;
      pointer-events:none;
    }

    @keyframes fall{
      0%{transform:translateY(-12px) rotate(0deg); opacity:1;}
      100%{transform:translateY(110vh) rotate(720deg); opacity:0;}
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 1100px){
      .layout{
        grid-template-columns:1fr;
      }
      .chat-panel{
        position:relative;
        top:auto;
        height:auto;
        min-height:520px;
      }
    }

    @media (max-width: 768px){
      body{padding:14px;}
      .container{padding:22px;}
      .controls button{
        min-width:160px;
        min-height:54px;
        padding:14px 22px;
      }
      .bingo-grid{
        gap:10px;
        padding:16px;
      }
      .emoji-btn{
        height:42px;
      }
    }

    @media (max-width: 560px){
      .turn-indicator{
        left:12px;
        right:12px;
        top:12px;
        max-width:none;
        text-align:center;
        font-size:.95rem;
      }
      .theme-toggle{
        top:12px;
        right:12px;
        width:48px;
        height:48px;
      }
      .container{padding:18px;}
      .controls{
        flex-direction:column;
      }
      .controls button{
        width:100%;
        min-width:0;
      }
      .bingo-grid{
        gap:8px;
      }
      .chat-panel{
        min-height:460px;
      }
      .chat-composer{
        flex-direction:column;
      }
      .chat-send{
        min-height:52px;
        width:100%;
      }
    }
  </style>
</head>

<body>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark or light mode">🌙</button>

  <div id="turnIndicator" class="turn-indicator">Loading...</div>

  <div class="layout">
    <main class="container">
      <h1>🎲 2-Player Turn Bingo</h1>

      <div class="player-role" id="playerRole">Loading...</div>

      <div class="bingo-grid" id="bingoGrid" aria-label="Bingo board"></div>

      <div class="controls">
        <button id="newGameBtn" type="button">🆕 New Game</button>
        <button id="copyLinkBtn" type="button">📱 Copy Links</button>
      </div>

      <div class="status" id="status">
        <div class="status-title">📊 Game Status</div>
        <div class="game-status" id="gameStatus">Click New Game to start!</div>
        <div class="subtle" id="subStatus">Real-time LAN sync active</div>
	<div class="subtle" id="lineStatus">🏆 Your Lines: 0 | Opponent Lines: 0</div>
      </div>
    </main>

    <aside class="chat-panel" aria-label="Live chat">
      <div class="chat-head">
        <h2>Live Chat</h2>
        <p>Chat with your opponent in real time and make the game more fun.</p>
      </div>

      <div class="emoji-row" id="emojiRow">
        <button class="emoji-btn" type="button" data-emoji="😂" aria-label="Send laughing emoji">😂</button>
        <button class="emoji-btn" type="button" data-emoji="😆" aria-label="Send grinning emoji">😆</button>
        <button class="emoji-btn" type="button" data-emoji="😡" aria-label="Send angry emoji">😡</button>
        <button class="emoji-btn" type="button" data-emoji="😛" aria-label="Send playful emoji">😛</button>
        <button class="emoji-btn" type="button" data-emoji="😤" aria-label="Send frustrated emoji">😤</button>
      </div>

      <div id="chatLog" class="chat-log" role="log" aria-live="polite" aria-relevant="additions text">
        <div class="chat-empty">No messages yet.</div>
      </div>

<div style="padding: 0 14px 10px;">
  <button
    id="clearChatBtn"
    type="button"
    style="
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      font-weight: 700;
      cursor: pointer;
    ">
    🗑️ Clear Chat
  </button>
</div>

      <div class="chat-composer">
        <input id="chatInput" class="chat-input" type="text" placeholder="Type a message..." aria-label="Chat message" />
        <button id="chatSend" class="chat-send" type="button" aria-label="Send chat message">➤</button>
      </div>
    </aside>
  </div>

  <div id="winnerOverlay" class="winner-overlay" aria-hidden="true">
    <div class="winner-card">
      <h3 id="winnerTitle">Winner!</h3>
      <p id="winnerText">Great game</p>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const playerType = urlParams.get('type') === 'guest' ? 'guest' : 'host';
    const isHost = playerType === 'host';

    const bingoGrid = document.getElementById('bingoGrid');
    const newGameBtn = document.getElementById('newGameBtn');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const gameStatus = document.getElementById('gameStatus');
    const subStatus = document.getElementById('subStatus');
    const lineStatus = document.getElementById('lineStatus');
    const playerRole = document.getElementById('playerRole');
    const turnIndicator = document.getElementById('turnIndicator');
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const winnerOverlay = document.getElementById('winnerOverlay');
    const winnerTitle = document.getElementById('winnerTitle');
    const winnerText = document.getElementById('winnerText');

    let gameData = {
      numbers: [],
      markedNumbers: [],
      currentTurn: 'host',
      gameActive: true,
      winner: null,
      isDraw: false
    };

    let cells = [];
    let chatSince = 0;
    let endedStateShown = false;
    let pollTimer = null;
    let chatTimer = null;

    playerRole.innerHTML = isHost
      ? '👑 <strong>HOST</strong> - You start first!'
      : '👤 <strong>GUEST</strong>';

    function setTheme(mode){
      document.body.classList.toggle('dark', mode === 'dark');
      themeToggle.textContent = mode === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('bingo-theme', mode);
    }

    const savedTheme = localStorage.getItem('bingo-theme');
    if (savedTheme === 'dark' || savedTheme === 'light') {
      setTheme(savedTheme);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    } else {
      setTheme('light');
    }

    themeToggle.addEventListener('click', () => {
      const next = document.body.classList.contains('dark') ? 'light' : 'dark';
      setTheme(next);
    });

    function createGridIfNeeded() {
      if (cells.length) return;
      bingoGrid.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell locked';
        cell.dataset.index = String(i);
        cell.addEventListener('click', () => handleCellClick(i));
        bingoGrid.appendChild(cell);
        cells.push(cell);
      }
    }

    function formatTime(ts) {
      const date = new Date(ts);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendChatMessage(msg) {
      const empty = chatLog.querySelector('.chat-empty');
      if (empty) empty.remove();

      const item = document.createElement('div');
      item.className = `chat-item ${msg.type}`;
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';

      const meta = document.createElement('div');
      meta.className = 'chat-meta';
      meta.innerHTML = `<span>${msg.type === 'host' ? 'HOST' : 'GUEST'}</span><span>${formatTime(msg.ts)}</span>`;

      const content = document.createElement('div');
      content.textContent = msg.message;

      bubble.appendChild(meta);
      bubble.appendChild(content);
      item.appendChild(bubble);
      chatLog.appendChild(item);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function showWinner(kind) {
      if (endedStateShown) return;
      endedStateShown = true;

      if (kind === 'draw') {
        winnerTitle.textContent = '🤝 Draw!';
        winnerText.textContent = 'Both players reached 5 lines at the same time.';
      } else if (kind === playerType) {
        winnerTitle.textContent = '🎉 You Win!';
        winnerText.textContent = 'First to 5 lines. Great play!';
      } else {
        winnerTitle.textContent = '💥 You Lost!';
        winnerText.textContent = 'Opponent reached 5 lines first.';
      }

      winnerOverlay.classList.add('show');
      winnerOverlay.setAttribute('aria-hidden', 'false');
      launchConfetti();
      setTimeout(() => {
        winnerOverlay.classList.remove('show');
        winnerOverlay.setAttribute('aria-hidden', 'true');
      }, 2200);
    }

    function launchConfetti() {
      const colors = ['#22c55e', '#60a5fa', '#f59e0b', '#ec4899', '#ef4444', '#a855f7'];
      for (let i = 0; i < 32; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = (Math.random() * 0.25) + 's';
        el.style.transform = `translateY(-12px) rotate(${Math.random() * 180}deg)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2300);
      }
    }

    function updateTurnIndicator() {
      const myTurn = gameData.gameActive && gameData.currentTurn === playerType;
      turnIndicator.textContent = gameData.gameActive
        ? (myTurn ? '🎯 YOUR TURN!' : "⏳ Opponent's Turn")
        : (gameData.isDraw ? '🤝 DRAW' : (gameData.winner === playerType ? '🏆 YOU WIN' : '💥 YOU LOST'));
      turnIndicator.classList.toggle('your-turn', myTurn);
    }

    function updateGameStatus() {
      if (!gameData.gameActive) {
        if (gameData.isDraw) {
          gameStatus.textContent = 'Draw! Both got 5 lines together.';
          subStatus.textContent = 'Game finished';
          showWinner('draw');
        } else if (gameData.winner === playerType) {
          gameStatus.textContent = 'You win! First to 5 lines.';
          subStatus.textContent = 'Game finished';
          showWinner(playerType);
        } else {
          gameStatus.textContent = 'You lost. Opponent got 5 lines first.';
          subStatus.textContent = 'Game finished';
          showWinner(gameData.winner || 'guest');
        }
      } else {
        gameStatus.textContent = gameData.currentTurn === playerType
          ? 'Your turn. Tap a number to play.'
          : 'Waiting for opponent...';
        subStatus.textContent = 'Real-time LAN sync active';
      }
	const myLines = playerType === 'host' ? gameData.hostLines : gameData.guestLines;
	const opponentLines = playerType === 'host' ? gameData.guestLines : gameData.hostLines;

	lineStatus.textContent =
	  `🏆 Your Lines: ${myLines} | Opponent Lines: ${opponentLines}`;
    }

    function renderBoard() {
      createGridIfNeeded();
      cells.forEach((cell, index) => {
        const number = gameData.numbers[index];
        cell.textContent = number ?? '';
        const marked = gameData.markedNumbers.includes(number);
        const locked = !gameData.gameActive || gameData.currentTurn !== playerType || marked;
        cell.classList.toggle('marked', marked);
        cell.classList.toggle('locked', locked);
      });
    }

    function handleCellClick(index) {
      if (!gameData.gameActive || gameData.currentTurn !== playerType) return;

      const number = gameData.numbers[index];
      if (gameData.markedNumbers.includes(number)) return;

      fetch(`/mark/${playerType}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number })
      })
      .then(r => r.json())
      .then(result => {
        if (!result.ok) {
          gameStatus.textContent = result.reason || 'Action not allowed.';
          return;
        }
        fetchGameState(true);
      })
      .catch(() => {
        gameStatus.textContent = 'Network error.';
      });
    }

    function fetchGameState(forceRender = false) {
      fetch(`/game/${playerType}`)
        .then(r => r.json())
        .then(data => {
          const wasActive = gameData.gameActive;
          const wasWinner = gameData.winner;
          const wasDraw = gameData.isDraw;

          gameData = data;
          renderBoard();
          updateTurnIndicator();
          updateGameStatus();

          if (forceRender || wasActive !== data.gameActive || wasWinner !== data.winner || wasDraw !== data.isDraw) {
            // status already updated
          }
        })
        .catch(() => {
          gameStatus.textContent = 'Unable to sync game state.';
        });
    }

function fetchChat() {
  fetch(`/chat?since=${chatSince}`)
    .then(r => r.json())
    .then(data => {
      // If server chat is empty, clear UI for all players
      if (data.latestId === 0) {
        chatSince = 0;

        if (chatLog.querySelector('.chat-item')) {
          chatLog.innerHTML =
            '<div class="chat-empty">No messages yet.</div>';
        }
      }

      // Add new messages if available
      if (data.messages && data.messages.length > 0) {
        const empty = chatLog.querySelector('.chat-empty');
        if (empty) empty.remove();

        data.messages.forEach(msg => {
          appendChatMessage(msg);
          chatSince = Math.max(chatSince, msg.id);
        });
      }

      // Safety fallback if chat area becomes blank
      if (
        !chatLog.querySelector('.chat-item') &&
        !chatLog.querySelector('.chat-empty')
      ) {
        chatLog.innerHTML =
          '<div class="chat-empty">No messages yet.</div>';
      }
    })
    .catch(() => {});
}

function sendChat(message) {
  const text = String(message || '').trim();

  if (!text) return;

  fetch(`/chat/${playerType}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: text
    })
  })
    .then(response => response.json())
    .then(result => {
      if (result.ok && result.message) {
        // Remove "No messages yet."
        const empty = chatLog.querySelector('.chat-empty');
        if (empty) empty.remove();

        // Add new message instantly
        appendChatMessage(result.message);

        // Update latest message ID
        chatSince = Math.max(chatSince, result.message.id);

        // Clear input box
        chatInput.value = '';
      } else {
        gameStatus.textContent =
          result.reason || 'Unable to send message.';
      }
    })
    .catch(() => {
      gameStatus.textContent = 'Unable to send message.';
    });
}

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      if (chatTimer) clearInterval(chatTimer);
      pollTimer = setInterval(() => fetchGameState(false), 220);
      chatTimer = setInterval(() => fetchChat(), 450);
    }

    newGameBtn.addEventListener('click', () => {
      fetch(`/newgame/${playerType}`, { method: 'POST' })
        .then(() => {
          endedStateShown = false;
          winnerOverlay.classList.remove('show');
          winnerOverlay.setAttribute('aria-hidden', 'true');
          fetchGameState(true);
          fetchChat();
        });
    });

    copyLinkBtn.addEventListener('click', async () => {
      const hostUrl = `${window.location.origin}${window.location.pathname}`;
      const guestUrl = `${hostUrl}?type=guest`;
      const text = `HOST: ${hostUrl}\nGUEST: ${guestUrl}`;
      try {
        await navigator.clipboard.writeText(text);
        gameStatus.textContent = 'Links copied!';
      } catch {
        gameStatus.textContent = text;
      }
    });

    document.getElementById('emojiRow').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-emoji]');
      if (!btn) return;
      sendChat(btn.dataset.emoji);
    });

    chatSend.addEventListener('click', () => sendChat(chatInput.value));
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendChat(chatInput.value);
      }
    });

clearChatBtn.addEventListener('click', async () => {
  try {
    const response = await fetch('/clear-chat', {
      method: 'POST',
      cache: 'no-store'
    });

    const result = await response.json();

    if (result.ok) {

      chatSince = 0;
      chatLog.innerHTML =
        '<div class="chat-empty">No messages yet.</div>';

      gameStatus.textContent = '🗑️ Chat cleared for both players.';
    }
  } catch (error) {
    gameStatus.textContent = 'Unable to clear chat.';
  }
});

    fetchGameState(true);
    fetchChat();
    startPolling();
  </script>
</body>
</html>
